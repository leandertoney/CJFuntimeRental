name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Config Function
        run: supabase functions deploy config --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Checkout Function
        run: supabase functions deploy checkout --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Webhook Function
        run: supabase functions deploy webhook --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Admin Function
        run: supabase functions deploy admin --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Pickup Reminders Function
        run: supabase functions deploy send-pickup-reminders --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Return Instructions Function
        run: supabase functions deploy send-return-instructions --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Mid-Rental Checkins Function
        run: supabase functions deploy send-mid-rental-checkins --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Health Check Function
        run: supabase functions deploy health-check --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ID Upload Function
        run: supabase functions deploy id-upload --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

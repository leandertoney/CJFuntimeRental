name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Idempotent (IF NOT EXISTS) — safe to run on every deploy. Must run
      # BEFORE the email functions deploy, since they query these columns.
      - name: Apply email dedup migration
        run: |
          SQL=$(jq -Rs . < supabase/migrations/20260709000001_email_dedup_columns.sql)
          curl -sf -X POST "https://api.supabase.com/v1/projects/yzdtevrwystezhbmgcwn/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Idempotent (IF NOT EXISTS) — safe to run on every deploy. Must run
      # BEFORE the webhook/admin functions deploy, since they read/write this column.
      - name: Apply vehicle_key migration
        run: |
          SQL=$(jq -Rs . < supabase/migrations/20260715000001_vehicle_key_column.sql)
          curl -sf -X POST "https://api.supabase.com/v1/projects/yzdtevrwystezhbmgcwn/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Idempotent (IF NOT EXISTS) — safe to run on every deploy. Must run
      # BEFORE the webhook/admin functions deploy, since they read/write the
      # deposit + payment-intent columns.
      - name: Apply deposit columns migration
        run: |
          SQL=$(jq -Rs . < supabase/migrations/20260723000001_deposit_columns.sql)
          curl -sf -X POST "https://api.supabase.com/v1/projects/yzdtevrwystezhbmgcwn/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $SQL}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Config Function
        run: supabase functions deploy config --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Checkout Function
        run: supabase functions deploy checkout --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Webhook Function
        run: supabase functions deploy webhook --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Admin Function
        run: supabase functions deploy admin --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Pickup Reminders Function
        run: supabase functions deploy send-pickup-reminders --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Return Instructions Function
        run: supabase functions deploy send-return-instructions --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Mid-Rental Checkins Function
        run: supabase functions deploy send-mid-rental-checkins --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Health Check Function
        run: supabase functions deploy health-check --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy ID Upload Function
        run: supabase functions deploy id-upload --project-ref yzdtevrwystezhbmgcwn
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

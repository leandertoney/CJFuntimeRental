<!DOCTYPE html>
<html>
<head>
  <title>Modal Test</title>
  <style>
    :root { --black:#0A0A0A; --dark:#111111; --surface:#171717; --border:rgba(255,255,255,0.07); --orange:#FF6B00; --white:#FFFFFF; --muted:#888888; }
    body { font-family:sans-serif; background:var(--dark); color:var(--white); padding:40px; }
    .modal-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; padding:20px; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px; max-width:500px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    .modal-title { font-size:1.4rem; margin-bottom:16px; color:var(--orange); }
    .modal-message { line-height:1.6; margin-bottom:24px; color:var(--white); }
    .modal-btn { background:var(--orange); color:#000; border:none; border-radius:8px; padding:14px 28px; font-weight:700; cursor:pointer; width:100%; }
    button { background:var(--orange); color:#000; border:none; padding:12px 24px; border-radius:8px; font-weight:700; cursor:pointer; margin:8px; }
  </style>
</head>
<body>
  <h1>Modal Component Test</h1>
  <button onclick="showModal('Please upload both the front and back of your ID.')">Test: Missing Files</button>
  <button onclick="showModal('Please accept the Rental Agreement to continue.')">Test: Missing Agreement</button>
  <button onclick="showModal('Each file must be 10 MB or smaller.')">Test: File Too Large</button>
  <button onclick="showModal('Something went wrong. Please try again.', 'Error')">Test: Generic Error</button>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">Notice</div>
      <div class="modal-message" id="modal-message"></div>
      <button class="modal-btn" id="modal-close">OK</button>
    </div>
  </div>

  <script>
    function showModal(message, title) {
      var overlay = document.getElementById('modal-overlay');
      var titleEl = document.getElementById('modal-title');
      var messageEl = document.getElementById('modal-message');
      var closeBtn = document.getElementById('modal-close');

      titleEl.textContent = title || 'Notice';
      messageEl.textContent = message;
      overlay.classList.add('show');

      function close() {
        overlay.classList.remove('show');
        closeBtn.removeEventListener('click', close);
        overlay.removeEventListener('click', overlayClick);
      }

      function overlayClick(e) {
        if (e.target === overlay) close();
      }

      closeBtn.addEventListener('click', close);
      overlay.addEventListener('click', overlayClick);
    }

    console.log('Modal test page loaded. Click buttons to test modal behavior.');
  </script>
</body>
</html>

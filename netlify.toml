# Return 410 (Gone) for legacy spam/hack URLs to signal permanent removal to search engines
[[redirects]]
  from = "/news/*"
  to = "/410.html"
  status = 410
  force = true

[[redirects]]
  from = "/*index.php*"
  to = "/410.html"
  status = 410
  force = true


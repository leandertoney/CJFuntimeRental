<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | CJ's Fun Time Rental</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"></noscript>
  <style>
    :root { --black:#0A0A0A; --dark:#111111; --surface:#171717; --border:rgba(255,255,255,0.07); --orange:#FF6B00; --amber:#ffb700; --white:#FFFFFF; --muted:#888888; --heading:'Bebas Neue',sans-serif; --body:'Inter',sans-serif; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { font-family:var(--body); background:var(--dark); color:var(--white); line-height:1.6; overflow-x:hidden; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
    a { color:inherit; text-decoration:none; }
    .container { max-width:1000px; margin:0 auto; padding:0 28px; }
    .site-header { position:static; z-index:100; background:rgba(17,17,17,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:16px 0; }
    .header-inner { display:flex; align-items:center; justify-content:space-between; }
    .header-logo img { height:40px; width:auto; }
    .main { flex:1; padding:64px 0; }
    .checkout-grid { display:grid; grid-template-columns:1.4fr 1fr; gap:48px; align-items:start; }
    .checkout-summary { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:32px; position:sticky; top:100px; }
    h1 { font-family:var(--heading); font-size:clamp(2rem,4vw,2.8rem); letter-spacing:3px; margin-bottom:24px; }
    h2 { font-family:var(--heading); font-size:1.6rem; letter-spacing:2px; margin-bottom:16px; }
    .summary-row { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
    .summary-row:last-child { border:none; font-weight:600; font-size:1.2rem; color:var(--amber); }
    .summary-label { color:var(--muted); }
    .summary-value { font-weight:600; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; font-family:var(--body); font-weight:700; font-size:16px; border-radius:8px; padding:16px 32px; cursor:pointer; border:none; transition:all 0.2s; width:100%; margin-top:24px; }
    .btn-primary { background:var(--orange); color:#000; }
    .btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .details-section { margin-bottom:32px; }
    .detail-row { display:flex; justify-content:space-between; padding:10px 0; font-size:15px; }
    .detail-label { color:var(--muted); }
    .error-message { background:rgba(255,77,0,0.1); border:1px solid rgba(255,77,0,0.3); border-radius:8px; padding:16px; margin-bottom:24px; color:#ff6b4d; }
    .loading { text-align:center; padding:48px; color:var(--muted); }
    /* ID upload */
    .id-help { font-size:14px; color:var(--white); line-height:1.6; margin-bottom:12px; }
    .id-uploads { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:8px; }
    .id-drop { display:flex; flex-direction:column; gap:8px; border:1px dashed rgba(255,255,255,0.2); border-radius:10px; padding:16px; cursor:pointer; transition:border-color 0.2s; }
    .id-drop:hover { border-color:var(--orange); }
    .id-drop.filled { border-style:solid; border-color:#4ade80; }
    .id-drop-label { font-weight:600; font-size:14px; }
    .id-drop input[type=file] { font-size:12px; color:var(--muted); }
    .id-file-name { font-size:12px; color:var(--muted); word-break:break-all; }
    /* Agreement */
    .agreement-box { max-height:200px; overflow-y:auto; white-space:pre-wrap; font-size:13px; line-height:1.6; color:var(--muted); background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:14px; }
    .agreement-check { display:flex; align-items:flex-start; gap:10px; font-size:14px; cursor:pointer; }
    .agreement-check input { margin-top:3px; width:18px; height:18px; flex-shrink:0; accent-color:var(--orange); }
    @media(max-width:768px) { .checkout-grid{grid-template-columns:1fr;} .id-uploads{grid-template-columns:1fr;} }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="header-logo"><img src="/cj_funtime_logo.png" alt="CJ's Fun Time Rental"></a>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div id="checkout-content" class="loading">Loading your booking...</div>
    </div>
  </main>

  <script src="https://yzdtevrwystezhbmgcwn.supabase.co/functions/v1/config"></script>
  <script>
    (function() {
      'use strict';

      var SUPABASE_FUNCTIONS = 'https://yzdtevrwystezhbmgcwn.supabase.co/functions/v1';

      // Rental agreement — PLACEHOLDER. Keep in sync with the authoritative copy
      // in supabase/functions/_shared/rental-agreement.ts (that server copy is
      // what gets stored on the booking). When the owner's real contract is
      // ready, update both. Bump the version string in lockstep.
      var AGREEMENT_VERSION = 'placeholder-v1';
      var AGREEMENT_TEXT = [
        "CJ'S FUN TIME RENTAL — RENTAL AGREEMENT (PLACEHOLDER)",
        "",
        "This is placeholder rental-agreement text and is not the final contract. By checking the box and completing your booking you acknowledge and agree to the following:",
        "",
        "1. Valid ID. You will present a valid government-issued photo ID at pickup that matches the ID uploaded with this booking. For the Can-Am Spyder you must hold a valid driver's license with a motorcycle (M) endorsement; it will be checked in person before the vehicle is released.",
        "",
        "2. Eligible operator. You are the person who will operate the vehicle, you are legally permitted to drive it, and you will obey all traffic laws.",
        "",
        "3. Condition & return. You will return the vehicle on time and in the same condition it was provided, normal wear excepted.",
        "",
        "4. Responsibility. You accept responsibility for damage, loss, citations, or tolls incurred during your rental period, subject to the final signed agreement provided at pickup.",
        "",
        "5. Final agreement. A complete rental agreement will be provided for signature at pickup. This online acknowledgment does not replace that document.",
        "",
        "CJ's Fun Time Rental · Lancaster, PA"
      ].join('\n');

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      // Get booking data from sessionStorage
      var bookingData = sessionStorage.getItem('cjfr_booking_data');
      if (!bookingData) {
        document.getElementById('checkout-content').innerHTML =
          '<div class="error-message">No booking data found. Please start from a vehicle page.</div>' +
          '<a href="/#fleet" class="btn btn-primary">View Fleet</a>';
        return;
      }

      try {
        bookingData = JSON.parse(bookingData);
      } catch (e) {
        document.getElementById('checkout-content').innerHTML =
          '<div class="error-message">Invalid booking data. Please start over.</div>' +
          '<a href="/#fleet" class="btn btn-primary">View Fleet</a>';
        return;
      }

      // Get vehicle info from config
      var vehicleInfo = null;
      if (window.SITE_CONFIG && window.SITE_CONFIG.vehicles) {
        vehicleInfo = window.SITE_CONFIG.vehicles[bookingData.vehicleKey];
      }

      // Format dates
      function formatDate(dateStr) {
        if (!dateStr) return '—';
        var d = new Date(dateStr + 'T12:00:00');
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      }

      function formatCurrency(cents) {
        return '$' + (cents / 100).toFixed(2).replace(/\.00$/, '');
      }

      function getDurationLabel() {
        if (bookingData.durationType === 'hourly') {
          return bookingData.hours + ' hours';
        } else if (bookingData.durationType === '10hr') {
          return '10 hours';
        } else if (bookingData.durationType === '24hr') {
          return '24 hours';
        } else if (bookingData.durationType === 'multi') {
          return bookingData.days + ' days';
        }
        return '';
      }

      // Render checkout page
      var html = '<h1>Review & Complete Booking</h1>';
      html += '<div class="checkout-grid">';

      // Left column: Details
      html += '<div>';
      html += '<div class="details-section">';
      html += '<h2>Trip Details</h2>';
      html += '<div class="detail-row"><span class="detail-label">Vehicle</span><span>' + (vehicleInfo ? vehicleInfo.name : bookingData.vehicleKey) + '</span></div>';
      html += '<div class="detail-row"><span class="detail-label">Duration</span><span>' + getDurationLabel() + '</span></div>';
      html += '<div class="detail-row"><span class="detail-label">Pickup Date</span><span>' + formatDate(bookingData.startDate) + '</span></div>';
      if (bookingData.durationType === 'multi') {
        html += '<div class="detail-row"><span class="detail-label">Return Date</span><span>' + formatDate(bookingData.endDate) + '</span></div>';
      }
      html += '<div class="detail-row"><span class="detail-label">Pickup Time</span><span>' + (bookingData.pickupTime || bookingData.startTime || '9:00 AM') + '</span></div>';
      html += '</div>';

      if (bookingData.deliveryDropoff || bookingData.deliveryPickup) {
        html += '<div class="details-section">';
        html += '<h2>Delivery Options</h2>';
        if (bookingData.deliveryDropoff) html += '<div class="detail-row"><span class="detail-label">Drop-off at my location</span><span>$50</span></div>';
        if (bookingData.deliveryPickup) html += '<div class="detail-row"><span class="detail-label">Pick up from my location</span><span>$50</span></div>';
        html += '</div>';
      }

      // ── ID upload (required for all bookings) ───────────────────────────────
      var isCanam = (bookingData.vehicleType === 'canam') ||
                    (bookingData.vehicleKey || '').toLowerCase().indexOf('canam') !== -1 ||
                    (bookingData.vehicleKey || '').toLowerCase().indexOf('spyder') !== -1;

      var idRuleText = isCanam
        ? "For the Can-Am Spyder you must upload a valid <strong>driver's license</strong> — a state ID card is <strong>not</strong> accepted. Your license must carry a motorcycle (M) endorsement, which Chris will confirm in person at pickup."
        : "Upload any valid government <strong>photo ID</strong> — a driver's license or a state ID card. No passport needed.";

      html += '<div class="details-section" id="id-upload-section">';
      html += '<h2>Upload Your ID</h2>';
      html += '<p class="id-help">' + idRuleText + '</p>';
      html += '<p class="id-help" style="color:var(--muted);">Please photograph the <strong>front and back</strong>. Accepted files: JPG, PNG, WEBP, or PDF (max 10&nbsp;MB each). Your ID is stored securely for pickup verification only.</p>';
      html += '<div class="id-uploads">';
      html += '  <label class="id-drop"><span class="id-drop-label">Front of ID</span>'
            + '<input type="file" id="id-front" accept="image/*,application/pdf">'
            + '<span class="id-file-name" id="id-front-name">No file chosen</span></label>';
      html += '  <label class="id-drop"><span class="id-drop-label">Back of ID</span>'
            + '<input type="file" id="id-back" accept="image/*,application/pdf">'
            + '<span class="id-file-name" id="id-back-name">No file chosen</span></label>';
      html += '</div>';
      html += '</div>';

      // ── Rental agreement (contract) ─────────────────────────────────────────
      html += '<div class="details-section" id="agreement-section">';
      html += '<h2>Rental Agreement</h2>';
      html += '<div class="agreement-box" id="agreement-box">' + esc(AGREEMENT_TEXT) + '</div>';
      html += '<label class="agreement-check"><input type="checkbox" id="agree-check"> '
            + 'I have read and agree to the Rental Agreement.</label>';
      html += '</div>';

      html += '</div>';

      // Right column: Summary
      html += '<div>';
      html += '<div class="checkout-summary">';
      html += '<h2>Order Summary</h2>';
      html += '<div class="summary-row"><span class="summary-label">Base Price</span><span class="summary-value">' + formatCurrency(bookingData.basePrice * 100) + '</span></div>';
      if (bookingData.deliveryFee > 0) {
        html += '<div class="summary-row"><span class="summary-label">Delivery</span><span class="summary-value">' + formatCurrency(bookingData.deliveryFee * 100) + '</span></div>';
      }
      html += '<div class="summary-row"><span class="summary-label">Total</span><span class="summary-value">' + formatCurrency(bookingData.total * 100) + '</span></div>';
      html += '<button class="btn btn-primary" id="complete-booking-btn">Complete Booking →</button>';
      html += '</div>';
      html += '</div>';

      html += '</div>';

      document.getElementById('checkout-content').innerHTML = html;

      var frontInput = document.getElementById('id-front');
      var backInput  = document.getElementById('id-back');
      var agreeCheck = document.getElementById('agree-check');
      var completeBtn = document.getElementById('complete-booking-btn');
      var DEFAULT_BTN_LABEL = 'Complete Booking →';

      // Gate the button until both ID images are chosen and the agreement is accepted.
      function refreshGate() {
        var ready = frontInput.files.length > 0 && backInput.files.length > 0 && agreeCheck.checked;
        completeBtn.disabled = !ready;
        completeBtn.textContent = ready ? DEFAULT_BTN_LABEL : 'Upload ID & accept agreement to continue';
      }

      function wireFileInput(input, nameId) {
        input.addEventListener('change', function () {
          var label = input.closest('.id-drop');
          if (input.files.length > 0) {
            document.getElementById(nameId).textContent = input.files[0].name;
            if (label) label.classList.add('filled');
          } else {
            document.getElementById(nameId).textContent = 'No file chosen';
            if (label) label.classList.remove('filled');
          }
          refreshGate();
        });
      }
      wireFileInput(frontInput, 'id-front-name');
      wireFileInput(backInput, 'id-back-name');
      agreeCheck.addEventListener('change', refreshGate);
      refreshGate();

      function readAsDataURL(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () { resolve(reader.result); };
          reader.onerror = function () { reject(new Error('Could not read file')); };
          reader.readAsDataURL(file);
        });
      }

      // Complete booking: upload ID + agreement first, THEN start Stripe checkout.
      completeBtn.addEventListener('click', function () {
        var btn = this;
        if (btn.disabled) return;

        var front = frontInput.files[0];
        var back  = backInput.files[0];
        if (!front || !back) { alert('Please upload both the front and back of your ID.'); return; }
        if (!agreeCheck.checked) { alert('Please accept the Rental Agreement to continue.'); return; }

        var MAX = 10 * 1024 * 1024;
        if (front.size > MAX || back.size > MAX) { alert('Each ID image must be 10 MB or smaller.'); return; }

        btn.disabled = true;
        btn.textContent = 'Uploading your ID…';

        // A client-generated reference links this upload to the booking that the
        // Stripe webhook will create after payment.
        var bookingRef = (window.crypto && crypto.randomUUID)
          ? crypto.randomUUID()
          : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
              var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
              return v.toString(16);
            });

        var days = 1;
        if (bookingData.durationType === 'multi' && bookingData.days) days = bookingData.days;

        Promise.all([readAsDataURL(front), readAsDataURL(back)])
          .then(function (imgs) {
            return fetch(SUPABASE_FUNCTIONS + '/id-upload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                bookingRef: bookingRef,
                vehicleKey: bookingData.vehicleKey,
                vehicleType: bookingData.vehicleType,
                front: imgs[0],
                back: imgs[1],
                frontType: front.type || 'image/jpeg',
                backType: back.type || 'image/jpeg',
                agreementAccepted: true,
                agreementVersion: AGREEMENT_VERSION
              })
            });
          })
          .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
          .then(function (r) {
            if (!r.ok || !r.data.ok) throw new Error(r.data.error || 'ID upload failed');
            btn.textContent = 'Starting secure checkout…';
            return fetch(SUPABASE_FUNCTIONS + '/checkout', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                vehicleKey: bookingData.vehicleKey,
                durationType: bookingData.durationType,
                hours: bookingData.hours,
                days: days,
                startDate: bookingData.startDate,
                endDate: bookingData.endDate || bookingData.startDate,
                pickupTime: bookingData.pickupTime || bookingData.startTime,
                totalCents: Math.round(bookingData.total * 100),
                baseCents: Math.round(bookingData.basePrice * 100),
                deliveryDropoff: bookingData.deliveryDropoff,
                deliveryPickup: bookingData.deliveryPickup,
                deliveryFee: bookingData.deliveryFee ? Math.round(bookingData.deliveryFee * 100) : 0,
                bookingRef: bookingRef
              })
            });
          })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.url) {
              window.location.href = data.url;
            } else {
              throw new Error(data.error || 'Failed to create checkout session');
            }
          })
          .catch(function (err) {
            console.error('[Checkout] Error:', err);
            alert((err && err.message) ? err.message : 'Something went wrong. Please try again.');
            btn.disabled = false;
            btn.textContent = DEFAULT_BTN_LABEL;
            refreshGate();
          });
      });

    })();
  </script>

</body>
</html>
